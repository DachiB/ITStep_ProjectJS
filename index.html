<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Shop</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body style="background-color: rgba(128, 128, 128, 0.2)">
    <div class="header">
      <h1 class="header2">Tech Shop</h1>
      <button class="header2 products">Cart</button>
    </div>
    <!-- <div class="line"></div> -->
    <section id="introSection">
      <div class="texts">
        <p>✓ Premium Delivery</p>
        <p>✓ Quality Products</p>
        <p>✓ Fresh Sales</p>
        <button class="header2 products" onclick="seeProducts()">
          See Products
        </button>
      </div>
      <img
        id="introImg"
        src="https://images.pexels.com/photos/205316/pexels-photo-205316.png?cs=srgb&dl=pexels-canvy-mockups-56805-205316.jpg&fm=jpg"
        alt=""
      />
    </section>
    <div class="line"></div>
    <div class="content">
      <div id="filter"></div>
      <section id="mainSection"></section>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
